# OSM configuration for extracting water infrastructure + populated places
# Place this file anywhere and reference with --config OSM_CONFIG_FILE=<path>

[points]
# Expose these tags as columns
attributes = name,man_made,amenity,landuse,waterway,place

[lines]
attributes = name,man_made,amenity,landuse,waterway,place

[multipolygons]
attributes = name,man_made,amenity,landuse,waterway,place

[multilinestrings]
attributes = name,man_made,amenity,landuse,waterway,place

[other_relations]
attributes = name,man_made,amenity,landuse,waterway,place
